# Site Settings
locale                   : "en-US"
title                    : "My 2026 Bug Bounty Challenge"
title_separator          : "|"
subtitle                 : "12 Week x 4 Quarters Challenge - Tracking my journey"
name                     : "Uday"
description              : "A comprehensive chronicle of my 365-day bug bounty challenge, featuring daily logs and weekly insights."
url                      : "https://heyiamuday.github.io/Bug-Bounty-Journey/"
baseurl                  : "/Bug-Bounty-Journey"
repository               : "heyiamuday/Bug-Bounty-Journey"
teaser                   : # path of fallback teaser image, e.g. "/assets/images/500x300.png"
logo                     : # path of logo image to display in the masthead, e.g. "/assets/images/88x88.png"
masthead_title           : "My 2026 Challenge" # overrides the website title displayed in the masthead, use " " for no title
breadcrumbs              : true # true, false (default)
words_per_minute         : 200

# Custom Head Includes
head_scripts:
  - https://code.jquery.com/jquery-3.6.0.min.js

# Custom CSS
custom_css               : /assets/css/custom.css

comments:
  provider               : # false (default), "disqus", "discourse", "facebook", "utterances", "giscus"
  disqus:
    shortname            : # https://help.disqus.com/customer/portal/articles/466208-what-s-a-shortname-
  discourse:
    server               : # https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963 , e.g.: meta.discourse.org
  facebook:
    appid                :
    num_posts            : # 5 (default)
    colorscheme          : # "light" (default), "dark"
  utterances:
    theme                : # "github-light" (default), "github-dark"
    issue_term           : # "pathname" (default)
  giscus:
    repo_id              : # Automatically set by `jekyll-github-metadata`, if you have a repository set up
    category_name        : # Full text name of the category
    category_id          : # "DIC_kwDOAbLEqc4CTBt1" is `Announcements` on the `github-beta` category. Use the identifier in the url of the category you want to use.
    mapping              : # "pathname" (default)
    strict               : # 1
    reactions_enabled    : # 1
    emit_metadata        : # 0
    theme                : # "light" (default), "dark"

# SEO Related
google_site_verification :
bing_site_verification   :
yandex_site_verification :
naver_site_verification  :

# Social Sharing
twitter:
  username               : # e.g., "your_twitter_username"
facebook:
  username               : # e.g., "your_facebook_username"
  app_id                 :
  publisher              :
og_image                 : # Open Graph/Twitter default site image
social:
  type                   : # Person or Organization (defaults to Person)
  name                   : # If the user or organization name differs from the site's name
  links: # An array of links to social media profiles

# Analytics
analytics:
  provider               : false # false (default), "google", "google-universal" or "custom"
  google:
    tracking_id          :
    anonymize_ip         : # true, false (default)

# Site Author
author:
  name             : "Your Name"
  avatar           : # path of avatar image, e.g. "/assets/images/bio-photo.jpg"
  bio              : "Bug Bounty Hunter | Security Researcher | 365-Day Challenge"
  location         : # "Bay Area"
  email            : "your-email@example.com"
  links:
    - label: "Email"
      icon: "fas fa-fw fa-envelope-square"
      url: "mailto:your-email@example.com"
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: # "https://your-website.com"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: # "https://twitter.com/"
    - label: "Facebook"
      icon: "fab fa-fw fa-facebook-square"
      url: # "https://facebook.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/heyiamuday"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: # "https://instagram.com/"

# Site Footer
footer:
  links:
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: # "https://twitter.com/"
    - label: "Facebook"
      icon: "fab fa-fw fa-facebook-square"
      url: # "https://facebook.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/heyiamuday"
    - label: "GitLab"
      icon: "fab fa-fw fa-gitlab"
      url: # "https://gitlab.com/"
    - label: "Bitbucket"
      icon: "fab fa-fw fa-bitbucket"
      url: # "https://bitbucket.org/"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: # "https://instagram.com/"

# Reading Files
include:
  - .htaccess
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .jekyll-cache
  - .jekyll-metadata
  - .ruby-version
  - .sass-cache
  - CHANGELOG
  - Capfile
  - Gemfile
  - Gemfile.lock
  - Gruntfile.js
  - Rakefile
  - README
  - tmp
  - /docs # ignore Minimal Mistakes /docs
  - /test # ignore Minimal Mistakes /test
keep_files:
  - .git
  - .gitignore
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# Conversion
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown Processing
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # https://sass-lang.com/documentation/file.SASS_CHANGELOG.html#3-1-0

# Outputting
permalink: /:categories/:title/
paginate: 10 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-archives

# Archives
#  Type
#  - GitHub Pages compatible archive pages built with Liquid (~12 seconds)
#  - Kramdown table of contents (~1 second)
#  - Liquid table of contents (~5 seconds)
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# https://github.com/jekyll/jekyll-archives
jekyll-archives:
  enabled:
    - categories
    - tags
  layouts:
    category: archive-taxonomy
    tag: archive-taxonomy
  permalinks:
    category: /categories/:name/
    tag: /tags/:name/

# HTML Compression
compress_html:
  clippings: all
  ignore:
    envs: development

# Collections
collections:
  logs:
    output: true
    permalink: /log/:path/
    layout: log

# Defaults
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true
      show_date: true
      date_format: "%B %d, %Y"
  
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  
  # _logs (custom collection)
  - scope:
      path: ""
      type: logs
    values:
      layout: log
      author_profile: false
      read_time: false
      share: true
      related: false

# Theme Settings (Minimal Mistakes)
remote_theme: mmistakes/minimal-mistakes@4.26.2
minimal_mistakes_skin: "dark" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# Atom feed all posts
feed:
  posts_limit: 10
